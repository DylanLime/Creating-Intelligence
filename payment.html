<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Payment Form</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        form { width: 300px; margin: auto; }\n        div { margin-bottom: 15px; }\n        label { display: block; margin-bottom: 5px; }\n        input[type='text'], input[type='email'], input[type='number'] { width: 100%; padding: 10px; box-sizing: border-box; }\n        button { padding: 10px; width: 100%; background-color: #28a745; color: white; border: none;\n        cursor: pointer; }\n        button:hover { background-color: #218838; }\n    </style>\n</head>\n<body>\n    <h2>Payment Form</h2>\n    <form id="paymentForm">\n        <div>\n            <label for="name">Name</label>\n            <input type="text" id="name" name="name" required>\n        </div>\n        <div>\n            <label for="email">Email</label>\n            <input type="email" id="email" name="email" required>\n        </div>\n        <div>\n            <label for="amount">Amount</label>\n            <input type="number" id="amount" name="amount" required>\n        </div>\n        <button type="submit">Pay Now</button>\n    </form>\n    <script>\n        document.getElementById('paymentForm').onsubmit = function(event) {\n            event.preventDefault();\n            alert('Payment processed!');\n            // Here you can add logic to handle the payment processing\n        };\n    <\/script>\n</body>\n</html>

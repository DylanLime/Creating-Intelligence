<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1, width=device-width">
   
	<link rel="stylesheet"  href="./index.css" />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap" />
   
	<script>
		function toggleLED() {
			// Send request to ESP32 to turn LED on
			fetch('http://192.168.4.75/led/on', {
				method: 'GET',
				mode: 'no-cors'
			})
			.then(response => {
				console.log('LED turned on');
			})
			.catch((error) => {
				console.error('Error:', error);
			});
		}
	</script>
</head>
<body>
   
	<div class="payment">
		<b class="total">Total</b>
		<div class="nav-bar">
			<img class="nav-bar-child" alt="">
			
			<img class="icon-backward" alt="" id="backwardIcon">
			
			<img class="nav-bar-item" alt="">
			
			<img class="logo-icon" alt="">
			
			<div class="button-profile">
				<img class="button-profile-child" alt="">
				
			</div>
		</div>
		<b class="payment2">Payment</b>
		<b class="b">€120</b>
		<div class="button-general" id="generalContainer" onclick="toggleLED()">
			<b class="button">Complete Transaction</b>
		</div>
		<b class="card-details">Card Details</b>
		<div class="button-text">
			<div class="text-wrapper">
				<div class="button">Firstname Surname</div>
			</div>
			<div class="text2">Cardholder Name</div>
		</div>
		<div class="button-text2">
			<div class="text-wrapper">
				<div class="button">0000 0000 0000 0000</div>
			</div>
			<div class="text2">Card Number</div>
		</div>
		<div class="button-text3">
			<div class="text-frame">
				<div class="button">MM/YYYY</div>
			</div>
			<div class="text2">Expiry Date</div>
		</div>
		<div class="button-text4">
			<div class="text-frame">
				<div class="button">123</div>
			</div>
			<div class="text2">CVV</div>
		</div>
	</div>
   
	<script>
		var backwardIcon = document.getElementById("backwardIcon");
		if(backwardIcon) {
			backwardIcon.addEventListener("click", function (e) {
				// Add your code here
			});
		}
		
		var generalContainer = document.getElementById("generalContainer");
		if(generalContainer) {
			generalContainer.addEventListener("click", function (e) {
				toggleLED();
			});
		}
	</script>
</body>
</html>

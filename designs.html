<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Design Screens</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .screen { display: none; padding: 20px; }\n        .active { display: block; }\n        .nav-button { margin: 5px; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <div id="login" class="screen active">\n        <h2>Login Screen</h2>\n        <input type="text" placeholder="Username"><br>\n        <input type="password" placeholder="Password"><br>\n        <button class="nav-button" onclick="showScreen('authLanding')">Login</button>\n    </div>\n    <div id="authLanding" class="screen">\n        <h2>Auth Landing Screen</h2>\n        <p>Welcome to the application!</p>\n        <button class="nav-button" onclick="showScreen('signup')">Sign Up</button>\n        <button class="nav-button" onclick="showScreen('login')">Log Out</button>\n    </div>\n    <div id="signup" class="screen">\n        <h2>Signup Screen</h2>\n        <input type="text" placeholder="Username"><br>\n        <input type="password" placeholder="Password"><br>\n        <button class="nav-button" onclick="showScreen('authLanding')">Sign Up</button>\n        <button class="nav-button" onclick="showScreen('login')">Back to Login</button>\n    </div>\n    <script>\n        function showScreen(screenId) {\n            const screens = document.querySelectorAll('.screen');\n            screens.forEach(screen => {\n                screen.classList.remove('active');\n            });\n            document.getElementById(screenId).classList.add('active');\n        }\n    </script>\n</body>\n</html>
